apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-react-app
  labels:
    app: kube-react-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kube-react-app
  template:
    metadata:
      labels:
        app: kube-react-app
    spec:
      containers:
        - name: kube-react-app
          image: karthi-a04/kubernetes-demo2
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
